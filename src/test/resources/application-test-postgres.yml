spring:
  datasource:
    url: ${test.db.url:jdbc:postgresql://localhost:5433/myjira_test}
    username: ${test.db.username:test_user}
    password: ${test.db.password:test_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: true

  # Disable OAuth2 for tests
  security:
    oauth2:
      client:
        registration: {}

  # Autoconfigure exclude for tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

logging:
  level:
    #Application
    ru.mymsoft.my_jira: DEBUG
    #Database
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.orm.jpa: DEBUG
    org.springframework.transaction.interceptor: TRACE
    #Sequrity
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
    #Etc.
    org.springframework.test.context: DEBUG
