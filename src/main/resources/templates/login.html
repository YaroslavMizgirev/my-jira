<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Jira — Вход</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background-color: #f0f2f5; }
        .login-card {
            max-width: 420px;
            margin: 10vh auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,.12);
        }
        .provider-btn { font-size: 1rem; padding: .65rem 1rem; border-radius: 8px; }
        .logo { font-size: 2rem; font-weight: 700; color: #0052cc; letter-spacing: -1px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <div class="logo">My Jira</div>
            <p class="text-muted mt-1">Система управления задачами</p>
        </div>

        <!-- Error message -->
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            Ошибка входа. Попробуйте ещё раз или выберите другой способ.
        </div>

        <p class="text-center text-muted mb-3">Войдите через один из сервисов:</p>

        <div class="d-grid gap-2">
            <a href="/oauth2/authorization/github"
               class="btn btn-dark provider-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                     class="bi bi-github me-2" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                Войти через GitHub
            </a>

            <a href="/oauth2/authorization/google"
               class="btn btn-outline-danger provider-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     class="me-2" style="vertical-align:-3px">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Войти через Google
            </a>

            <a href="/oauth2/authorization/gitlab"
               class="btn btn-outline-warning provider-btn text-dark">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#FC6D26"
                     class="me-2" viewBox="0 0 24 24">
                    <path d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 0 1-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 0 1 4.82 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.49h8.1l2.44-7.51A.42.42 0 0 1 18.6 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.51L23 13.45a.84.84 0 0 1-.35.94z"/>
                </svg>
                Войти через GitLab
            </a>

            <a href="/oauth2/authorization/yandex"
               class="btn btn-outline-danger provider-btn">
                Войти через Яндекс
            </a>

            <a href="/oauth2/authorization/mailru"
               class="btn btn-outline-primary provider-btn">
                Войти через Mail.ru
            </a>
        </div>

        <p class="text-center text-muted mt-4 small">
            Недоступные провайдеры скрыты автоматически.
        </p>
    </div>
</div>
</body>
</html>
