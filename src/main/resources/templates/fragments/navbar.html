<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-dark mj-navbar px-3">
    <!-- Brand -->
    <a th:href="@{/dashboard}" class="navbar-brand fw-bold fs-5 me-4">
        <span class="text-white">My</span><span class="mj-brand-accent">Jira</span>
    </a>

    <!-- Left links -->
    <ul class="navbar-nav flex-row gap-2 me-auto">
        <li class="nav-item">
            <a th:href="@{/projects}" class="nav-link px-2">Проекты</a>
        </li>
        <li class="nav-item">
            <a th:href="@{/issues}" class="nav-link px-2">Задачи</a>
        </li>
    </ul>

    <!-- Create button -->
    <a th:href="@{/issues/create}" class="btn btn-sm mj-btn-create me-3">
        + Создать
    </a>

    <!-- User dropdown -->
    <div class="dropdown" x-data="{ open: false }">
        <button class="btn btn-sm btn-dark d-flex align-items-center gap-2 border-0"
                @click="open = !open" @click.outside="open = false">
            <img th:if="${currentUser?.avatarUrl != null}"
                 th:src="${currentUser.avatarUrl}"
                 class="rounded-circle" width="28" height="28" alt="avatar"/>
            <span class="bi bi-person-circle fs-5"
                  th:if="${currentUser?.avatarUrl == null}"></span>
            <span th:text="${currentUser?.displayName ?: currentUser?.username ?: 'User'}"
                  class="d-none d-md-inline">User</span>
            <span class="bi bi-chevron-down small"></span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end mt-1" x-show="open" x-cloak>
            <li>
                <span class="dropdown-item-text small text-muted"
                      th:text="${currentUser?.email}"></span>
            </li>
            <li><hr class="dropdown-divider"/></li>
            <li><a th:href="@{/profile}" class="dropdown-item">
                <span class="bi bi-person me-2"></span>Профиль
            </a></li>
            <li><a th:href="@{/profile/notifications}" class="dropdown-item">
                <span class="bi bi-bell me-2"></span>Уведомления
            </a></li>
            <li><hr class="dropdown-divider"/></li>
            <li>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="dropdown-item text-danger">
                        <span class="bi bi-box-arrow-right me-2"></span>Выйти
                    </button>
                </form>
            </li>
        </ul>
    </div>
</nav>

</body>
</html>
